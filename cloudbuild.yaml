# Cloud Build configuration for deploying to Cloud Run.
# Usage: gcloud builds submit --config cloudbuild.yaml .

substitutions:
  _TAG: latest

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/brokerops-ai/brokerops-ai:${_TAG}'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/brokerops-ai/brokerops-ai:${_TAG}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'brokerops-ai'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/brokerops-ai/brokerops-ai:${_TAG}'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=512Mi'
      - '--timeout=300'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID'
      - '--service-account=brokerops-sa@$PROJECT_ID.iam.gserviceaccount.com'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/brokerops-ai/brokerops-ai:${_TAG}'
